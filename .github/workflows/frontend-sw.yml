name: Frontend Build & SW Verification

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm i -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          CI: true

      - name: Verify SW artifacts
        run: |
          node -e "
          const fs = require('fs');
          const p = 'public/sw-manifest.json';
          if (!fs.existsSync(p)) { console.error('Missing sw-manifest.json'); process.exit(1); }
          if (!fs.existsSync('public/__build_info.json')) { console.error('Missing __build_info.json'); process.exit(1); }
          const swjs = fs.readFileSync('public/sw.js','utf8');
          if (!/BUILD_ID|buildId/.test(swjs)) { console.error('sw.js missing BUILD_ID'); process.exit(1); }
          console.log('SW artifacts OK');
          "
